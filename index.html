<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Love All — Drake & JAY-Z</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Background layers -->
  <div class="bg-layer">
    <div class="bg-photo"></div>
    <div class="bg-gradient"></div>
    <div class="bg-noise"></div>
  </div>

  <!-- Player -->
  <div class="app">

    <!-- Cover art -->
    <div class="capa-wrapper">
      <div class="capa-ring"></div>
      <img src="capa.jpg" class="capa" alt="Love All cover">
    </div>

    <!-- Track info -->
    <div class="info">
      <h2>Love All (with JAY-Z)</h2>
      <p>Drake &amp; JAY-Z &nbsp;·&nbsp; Certified Lover Boy</p>
    </div>

    <!-- Waveform progress (SoundCloud style) -->
    <div class="progress-area">
      <div class="waveform-container">
        <canvas id="waveform-canvas"></canvas>
      </div>
      <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <!-- Controls: 5 buttons -->
    <div class="controls">

      <!-- 1. Previous / restart -->
      <button class="btn btn-sm" id="btn-prev" aria-label="Voltar ao início">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>

      <!-- 2. Rewind 10s -->
      <button class="btn btn-md" id="btn-back10" aria-label="Voltar 10 segundos">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          <text x="12" y="14.5" text-anchor="middle" font-size="5.5" font-family="DM Sans,sans-serif" font-weight="600" fill="currentColor">10</text>
        </svg>
      </button>

      <!-- 3. Play / Pause -->
      <button class="btn-play" id="btn-play" aria-label="Play/Pause">
        <!-- Play icon -->
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" style="margin-left:3px">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <!-- Pause icon -->
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <!-- 4. Forward 10s -->
      <button class="btn btn-md" id="btn-fwd10" aria-label="Avançar 10 segundos">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          <text x="12" y="14.5" text-anchor="middle" font-size="5.5" font-family="DM Sans,sans-serif" font-weight="600" fill="currentColor">10</text>
        </svg>
      </button>

      <!-- 5. Next track (skips to near end in single-track mode) -->
      <button class="btn btn-sm" id="btn-next" aria-label="Próxima faixa">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>

    </div>

    <!-- Lyrics -->
    <div class="letra-wrapper">
      <div id="letra"></div>
    </div>

    <audio id="musica" src="musica.mp3" preload="auto"></audio>

  </div>

  <script src="script.js"></script>
</body>
</html>
